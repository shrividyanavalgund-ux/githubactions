name: CI
on: 
  workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up node
        uses: actions/setup-node@v3

      - name: start the application
        run: npm start &
      - name: Run tests
        run: sleep 5
      - name: check health
        run: curl -f http://localhost:3000/health || exit 1